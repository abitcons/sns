name: Deploy SNS to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-sns-sbodesk
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production files
        run: npm run build

      - name: Upload dist to cPanel without deleting remote files
        env:
          CPANEL_FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
          CPANEL_FTP_USERNAME: ${{ secrets.CPANEL_FTP_USERNAME }}
          CPANEL_FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
          REMOTE_ROOTS: /public_html/sns.sbodesk.com,sns.sbodesk.com
        run: |
          python - <<'PY'
          import os
          from ftplib import FTP_TLS, error_perm
          from pathlib import Path

          host = os.environ["CPANEL_FTP_HOST"]
          username = os.environ["CPANEL_FTP_USERNAME"]
          password = os.environ["CPANEL_FTP_PASSWORD"]
          local_root = Path("dist")
          remote_roots = [
              root.strip("/")
              for root in os.environ["REMOTE_ROOTS"].split(",")
              if root.strip("/")
          ]

          def ensure_path(ftp, parts):
              ftp.cwd("/")
              for part in parts:
                  if not part:
                      continue
                  try:
                      ftp.cwd(part)
                  except error_perm:
                      try:
                          ftp.mkd(part)
                      except error_perm:
                          pass
                      ftp.cwd(part)

          def upload_tree(ftp, remote_root):
              base_parts = [part for part in remote_root.split("/") if part]
              files = sorted(
                  path for path in local_root.rglob("*")
                  if path.is_file() and path.name != ".ftp-deploy-sync-state.json"
              )

              print(f"Uploading to /{'/'.join(base_parts)} ({len(files)} files)")
              for index, path in enumerate(files, start=1):
                  rel = path.relative_to(local_root)
                  parent_parts = list(rel.parent.parts) if rel.parent != Path(".") else []
                  ensure_path(ftp, base_parts + parent_parts)
                  with path.open("rb") as handle:
                      if index == 1 or index % 10 == 0:
                          print(f"Uploading {index}/{len(files)}: {rel.as_posix()}")
                      ftp.storbinary(f"STOR {rel.name}", handle)

          ftp = FTP_TLS()
          ftp.connect(host, 21, timeout=120)
          ftp.auth()
          ftp.login(username, password)
          ftp.prot_p()
          ftp.set_pasv(True)

          print(f"FTP root is {ftp.pwd()}")
          for remote_root in remote_roots:
              upload_tree(ftp, remote_root)

          ftp.quit()
          print("UPLOAD_DONE")
          PY
